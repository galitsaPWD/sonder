<!DOCTYPE html>
<html lang="en" data-page="entry">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SONDER · entry</title>
  <link rel="stylesheet" href="sonder.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="sonder-body sonder-body--entry">
  <div class="entry-view">
    <div class="entry-view__background"></div>
    <header class="site-header site-header--overlay">
      <div class="site-header__logo" onclick="window.location.href='index.html'">SONDER</div>
      <nav class="site-header__nav">
        <a href="about.html">about</a>
        <a href="map.html">map</a>
        <a href="submit.html">submit</a>
        <a href="archive.html">archive</a>
        <a href="playlist.html">playlist</a>
      </nav>
    </header>

    <main class="entry-view__main">
      <article class="entry-view__card" id="singleEntryCard">
        <p class="entry-view__location" id="singleEntryLocation"></p>
        <p class="entry-view__timestamp" id="singleEntryTimestamp"></p>
        <div class="entry-view__text" id="singleEntryText"></div>
        <div class="entry-view__links" id="singleEntryLinks"></div>
        <div class="entry-view__actions">
          <button class="btn btn--ghost" id="singleEntryBack">back to map</button>
          <button class="btn btn--ghost" id="singleEntryFavorite">♡ favorite</button>
          <button class="btn btn--ghost" id="singleEntryShare">share</button>
        </div>
      </article>
    </main>
  </div>

  <script src="sonder.js"></script>
</body>
</html>
